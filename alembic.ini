# Alembic configuration file — used with async PostgreSQL.

[alembic]
script_location = alembic
# This is overridden in env.py to use the app's DATABASE_URL
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/news3twit

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
